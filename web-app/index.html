    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MindFlow" />

    <link rel="manifest" href="/manifest.json" />
    <title>MindFlow</title>
    <style>
      /* Prevent iOS tap highlight and overscroll */
      html { -webkit-tap-highlight-color: transparent; overscroll-behavior: none; }
      body { -webkit-user-select: none; user-select: text; overscroll-behavior: none; }
      /* Safe area padding for notched devices */
      :root { --sat: env(safe-area-inset-top); --sab: env(safe-area-inset-bottom); --sal: env(safe-area-inset-left); --sar: env(safe-area-inset-right); }
    </style>
  </head>

    <div id="root"></div>

  </body>
