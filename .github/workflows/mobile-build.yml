name: Mobile Build (EAS)

on:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        type: choice
        options: [android, ios, all]
        default: android
      profile:
        description: 'EAS build profile (see mobile/eas.json)'
        type: choice
        options: [development, preview, production]
        default: preview

concurrency:
  group: mobile-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  eas-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # workflow_dispatch lets you pick platform/profile; a push to main (mobile/** changed)
      # always builds both platforms on the production profile.
      - name: Resolve build inputs
        id: params
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "platform=${{ inputs.platform }}" >> "$GITHUB_OUTPUT"
            echo "profile=${{ inputs.profile }}" >> "$GITHUB_OUTPUT"
          else
            echo "platform=all" >> "$GITHUB_OUTPUT"
            echo "profile=production" >> "$GITHUB_OUTPUT"
          fi

      # --non-interactive requires EAS credentials to already be configured for this
      # project (run `eas credentials` locally once per platform before relying on this).
      # --no-wait kicks the build off on Expo's servers without tying up the runner;
      # track progress at expo.dev or with `eas build:list`.
      - name: EAS Build
        run: |
          eas build \
            --platform ${{ steps.params.outputs.platform }} \
            --profile ${{ steps.params.outputs.profile }} \
            --non-interactive \
            --no-wait
